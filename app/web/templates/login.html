<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Вход - Media Bridge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{margin:0;font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at top left, rgba(59,130,246,.12), transparent 30%),radial-gradient(circle at bottom right, rgba(124,58,237,.12), transparent 30%),#eff3f8;color:#1f2937}
    .login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .auth-card{width:min(100%,460px);background:#fff;border:1px solid #dce5f0;border-radius:28px;box-shadow:0 10px 30px rgba(15,23,42,.08);padding:28px}
    .auth-brand{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .brand-logo{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,#4c8bf5,#7c3aed);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900}
    .auth-title{margin:0;font-size:30px;font-weight:900}
    .auth-subtitle{margin:8px 0 0;color:#64748b;line-height:1.5}
    label{display:block;font-weight:700;margin-bottom:7px}
    input{width:100%;padding:12px;border:1px solid #dce5f0;border-radius:14px;box-sizing:border-box}
    .grid{display:grid;gap:16px}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:14px;background:#3b82f6;color:#fff;border:0;cursor:pointer;font-weight:800;text-decoration:none}
    .btn.secondary{background:#fff;color:#334155;border:1px solid #dce5f0}
    .error{background:#fff1f2;color:#9f1239;padding:12px 14px;border-radius:14px}
    .muted{color:#64748b;font-size:14px}
    .btn-row{display:flex;gap:10px;flex-wrap:wrap}
  </style>
</head>
<body>
  <div class="login-page">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="brand-logo">MB</div>
        <div>
          <h1 class="auth-title">Media Bridge</h1>
          <div class="auth-subtitle">Современная рабочая панель проекта. Войди под своим логином и паролем.</div>
        </div>
      </div>
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <form method="post" action="/admin/login" class="grid">
        <div>
          <label>Логин</label>
          <input name="username" required>
        </div>
        <div>
          <label>Пароль</label>
          <input name="password" type="password" required>
        </div>
        <button class="btn" type="submit">Войти</button>
      </form>
      <div class="btn-row" style="margin-top:12px;">
        <a class="btn secondary" href="/admin/forgot-password">Забыл пароль</a>
      </div>
    </div>
  </div>
</body>
</html>
