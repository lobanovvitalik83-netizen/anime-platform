{% extends "base.html" %}
{% block content %}
<div class="login-box">
  <div class="card">
    <h1>Вход в админку</h1>
    <p class="muted">Войди логином и паролем администратора.</p>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/admin/login" class="grid">
      <div>
        <label for="username">Логин</label>
        <input id="username" name="username" required>
      </div>
      <div>
        <label for="password">Пароль</label>
        <input id="password" name="password" type="password" required>
      </div>
      <button class="btn" type="submit">Войти</button>
    </form>
<div class="btn-row" style="margin-top:12px;"><a class="btn ghost" href="/admin/forgot-password">Забыл пароль</a></div>
  </div>
</div>
{% endblock %}
