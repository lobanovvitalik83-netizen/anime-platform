{% extends "base.html" %}
{% block content %}
<div class="auth-card">
  <h1 style="margin-top:0;">Восстановление доступа</h1>
  <div class="muted" style="margin-bottom:16px;">Укажи логин. Мы создадим внутренний запрос для администратора на сброс пароля.</div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  {% if success %}<div class="success">{{ success }}</div>{% endif %}
  <form method="post" action="/admin/forgot-password" class="grid">
    <div>
      <label>Логин</label>
      <input name="username" required>
    </div>
    <div class="btn-row">
      <button class="btn green" type="submit">Отправить запрос</button>
      <a class="btn ghost" href="/admin/login">Назад ко входу</a>
    </div>
  </form>
</div>
{% endblock %}
