{% extends "base.html" %}
{% block content %}
<div class="card">
  <h1 class="page-title">Восстановление доступа</h1>
  <div class="page-subtitle">Укажи свой логин. Для superadmin будет создано внутреннее уведомление на сброс пароля.</div>
  {% if error %}<div class="error" style="margin-top:16px;">{{ error }}</div>{% endif %}
  {% if success %}<div class="success" style="margin-top:16px;">{{ success }}</div>{% endif %}
  <form method="post" action="/admin/forgot-password" class="grid" style="margin-top:16px;">
    <div>
      <label>Логин</label>
      <input name="username" required>
    </div>
    <div class="btn-row">
      <button class="btn" type="submit">Отправить запрос</button>
      <a class="btn ghost" href="/admin/login">Назад ко входу</a>
    </div>
  </form>
</div>
{% endblock %}
