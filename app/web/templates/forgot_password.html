{% extends "base.html" %}
{% block content %}
<div style="max-width:520px;margin:60px auto;">
  <div class="card">
    <h1 class="page-title" style="font-size:28px;">Забыл пароль</h1>
    <div class="page-subtitle">Введи логин. Запрос попадёт администратору, и он сбросит пароль вручную.</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    {% if success %}<div class="success">{{ success }}</div>{% endif %}
    <form method="post" action="/admin/forgot-password" class="grid">
      <div><label>Логин</label><input name="username" required></div>
      <div class="btn-row"><button class="btn green" type="submit">Отправить запрос</button><a class="btn ghost" href="/admin/login">Назад</a></div>
    </form>
  </div>
</div>
{% endblock %}
