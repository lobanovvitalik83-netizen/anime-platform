{% extends "base.html" %}
{% block content %}
<div class="card">
  <h1>Создать чат</h1>
  {% if not messages_enabled %}<div class="error">Сообщения сейчас отключены superadmin.</div>{% endif %}
  {% if error %}<div class="error">{{ error }}</div>{% endif %}

  <form method="post" action="/admin/chats/new" class="grid">
    <div>
      <label>Название чата</label>
      <input name="title" value="{{ values.get('title', '') }}" required {% if not messages_enabled %}disabled{% endif %}>
    </div>

    <div>
      <label>Участники</label>
      <div class="grid cards">
        {% for item in admins %}
        <label class="card" style="padding:14px; display:flex; gap:10px; align-items:center;">
          <input type="checkbox" name="participant_ids" value="{{ item.id }}" {% if item.id in selected_ids %}checked{% endif %} style="width:auto;" {% if not messages_enabled %}disabled{% endif %}>
          <span>
            <b>{{ item.full_name or item.username }}</b><br>
            <span class="muted">{{ item.username }} / {{ item.role }}</span>
          </span>
        </label>
        {% endfor %}
      </div>
    </div>

    <div class="btn-row">
      <button class="btn green" type="submit" {% if not messages_enabled %}disabled{% endif %}>Создать чат</button>
      <a class="btn secondary" href="/admin/chats">Назад</a>
    </div>
  </form>
</div>
{% endblock %}
