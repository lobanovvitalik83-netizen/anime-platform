{% extends "base.html" %}
{% block content %}
<div class="card">
  <h1>Генерация кодов</h1>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  {% if generated_codes %}
    <div class="success">
      Сгенерировано кодов: {{ generated_codes|length }}
      <div style="margin-top:8px;">
        {% for item in generated_codes %}
          <span class="code">{{ item.code }}</span>
        {% endfor %}
      </div>
    </div>
  {% endif %}
  <form method="post" action="/admin/codes/generate" class="grid">
    <div class="form-grid">
      <div>
        <label>Количество</label>
        <input name="quantity" type="number" min="1" max="1000" value="{{ values.get('quantity', 10) }}" required>
      </div>
      <div>
        <label>Title ID</label>
        <select name="title_id">
          <option value="">Не указывать</option>
          {% for title in titles %}
          <option value="{{ title.id }}" {% if values.get('title_id') == title.id %}selected{% endif %}>{{ title.id }} - {{ title.title }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label>Season ID</label>
        <select name="season_id">
          <option value="">Не указывать</option>
          {% for season in seasons %}
          <option value="{{ season.id }}" {% if values.get('season_id') == season.id %}selected{% endif %}>{{ season.id }} - S{{ season.season_number }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label>Episode ID</label>
        <select name="episode_id">
          <option value="">Не указывать</option>
          {% for episode in episodes %}
          <option value="{{ episode.id }}" {% if values.get('episode_id') == episode.id %}selected{% endif %}>{{ episode.id }} - E{{ episode.episode_number }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label>Статус</label>
        <input name="status" value="{{ values.get('status', 'active') }}">
      </div>
    </div>
    <div class="btn-row">
      <button class="btn green" type="submit">Сгенерировать</button>
      <a class="btn secondary" href="/admin/codes">Назад к списку</a>
    </div>
  </form>
</div>
{% endblock %}
