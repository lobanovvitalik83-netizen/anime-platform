{% extends "base.html" %}
{% block content %}
<div class="card">
  <h1>Общие настройки</h1>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  {% if success %}<div class="success">{{ success }}</div>{% endif %}

  <form method="post" action="/admin/settings/general" class="grid">
    <div class="form-grid">
      <div>
        <label style="display:flex; gap:8px; align-items:center; font-weight:600; margin-top:30px;">
          <input type="checkbox" name="messages_enabled" {% if messages_enabled %}checked{% endif %} style="width:auto;">
          Включить сообщения на сайте
        </label>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn green" type="submit">Сохранить настройки</button>
      <a class="btn secondary" href="/admin">Назад</a>
    </div>
  </form>
</div>
{% endblock %}
