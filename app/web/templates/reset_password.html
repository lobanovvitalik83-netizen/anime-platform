{% extends 'base.html' %}
{% block content %}
<div class='card'>
  <h1 class='page-title'>Установка нового пароля</h1>
  {% if username %}<div class='page-subtitle'>Пользователь: {{ username }}</div>{% endif %}
  {% if error %}<div class='error' style='margin-top:16px;'>{{ error }}</div>{% endif %}
  {% if success %}<div class='success' style='margin-top:16px;'>{{ success }}</div>{% endif %}
  {% if not success %}
  <form method='post' action='/admin/reset-password/{{ token }}' class='grid' style='margin-top:16px;'>
    <div><label>Новый пароль</label><input type='password' name='password' required></div>
    <div><label>Повтори пароль</label><input type='password' name='password_repeat' required></div>
    <div class='btn-row'>
      <button class='btn green' type='submit'>Сохранить новый пароль</button>
      <a class='btn ghost' href='/admin/login'>Ко входу</a>
    </div>
  </form>
  {% else %}
  <div class='btn-row' style='margin-top:16px;'><a class='btn green' href='/admin/login'>Перейти ко входу</a></div>
  {% endif %}
</div>
{% endblock %}
