{% extends "base.html" %}
{% block content %}
<div class="login-box">
  <div class="card">
    <h1>Сброс пароля</h1>
    {% if username %}<div class="muted" style="margin-bottom:12px;">Пользователь: {{ username }}</div>{% endif %}
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    {% if success %}<div class="success">{{ success }}</div>{% endif %}
    {% if not success %}
    <form method="post" action="/admin/reset-password/{{ token }}" class="grid">
      <div><label>Новый пароль</label><input type="password" name="password" required></div>
      <div><label>Повтори пароль</label><input type="password" name="password_confirm" required></div>
      <button class="btn green" type="submit">Сохранить новый пароль</button>
    </form>
    {% endif %}
  </div>
</div>
{% endblock %}
