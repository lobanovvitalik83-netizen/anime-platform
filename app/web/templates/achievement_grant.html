{% extends "base.html" %}
{% block content %}
<div class="page-head">
  <div>
    <h1>Выдать ачивку</h1>
    <div class="page-sub">Сотрудник: {{ person.full_name or person.username }}. Выбери достижение и за что оно выдано.</div>
  </div>
  <div class="btn-row">
    <a class="btn ghost" href="/admin/people/{{ person.id }}">Назад в профиль сотрудника</a>
  </div>
</div>
<div class="card">
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="/admin/people/{{ person.id }}/achievements/grant" class="grid">
    <div>
      <label>Ачивка</label>
      <select name="achievement_id" required>
        <option value="">Выбери ачивку</option>
        {% for item in rows %}
        <option value="{{ item.id }}" {% if item.id in existing %}disabled{% endif %}>{{ item.title }}{% if item.id in existing %} — уже выдана{% endif %}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label>За что выдана</label>
      <textarea name="note" placeholder="Например: закрыл критический релиз без багов"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn green" type="submit">Выдать ачивку</button>
    </div>
  </form>
</div>
{% endblock %}
