<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Сброс пароля - Media Bridge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#eff3f8;color:#1f2937}
    .page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{width:min(100%,460px);background:#fff;border:1px solid #dce5f0;border-radius:24px;box-shadow:0 10px 30px rgba(15,23,42,.08);padding:28px}
    .title{margin:0 0 8px;font-size:28px;font-weight:900}.muted{color:#64748b;line-height:1.5}
    label{display:block;font-weight:700;margin-bottom:7px}input{width:100%;padding:12px;border:1px solid #dce5f0;border-radius:14px;box-sizing:border-box}
    .grid{display:grid;gap:16px}.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:14px;background:#3b82f6;color:#fff;border:0;cursor:pointer;font-weight:800;text-decoration:none}
    .error{background:#fff1f2;color:#9f1239;padding:12px 14px;border-radius:14px}.success{background:#ecfdf5;color:#166534;padding:12px 14px;border-radius:14px}
  </style>
</head>
<body>
<div class="page"><div class="card">
  <h1 class="title">Установить новый пароль</h1>
  <p class="muted">Пользователь: {{ target_username }}</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  {% if success %}<div class="success">{{ success }}</div>{% endif %}
  {% if not success %}
  <form method="post" action="" class="grid">
    <div><label>Новый пароль</label><input type="password" name="new_password" required></div>
    <div><label>Повтори пароль</label><input type="password" name="new_password_repeat" required></div>
    <button class="btn" type="submit">Сохранить новый пароль</button>
  </form>
  {% else %}
  <div class="grid"><a class="btn" href="/admin/login">Перейти ко входу</a></div>
  {% endif %}
</div></div>
</body>
</html>
