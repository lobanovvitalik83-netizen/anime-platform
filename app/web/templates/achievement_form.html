{% extends "base.html" %}
{% block content %}
<div class="card">
  <h1>{{ page_title }}</h1>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  {% if success %}<div class="success">{{ success }}</div>{% endif %}
  <form method="post" action="{{ action_url }}" class="grid">
    <div class="form-grid">
      <div><label>Название</label><input name="name" value="{{ values.get('name', '') }}" required></div>
      <div><label>Иконка URL</label><input name="icon_url" value="{{ values.get('icon_url', '') }}" placeholder="https://..."></div>
      <div><label style="display:flex; gap:8px; align-items:center; margin-top:30px;"><input type="checkbox" name="is_active" style="width:auto;" {% if values.get('is_active', True) %}checked{% endif %}>Активна</label></div>
    </div>
    <div><label>Описание</label><textarea name="description">{{ values.get('description', '') }}</textarea></div>
    {% if values.get('icon_url') %}
    <div><img src="{{ values.get('icon_url') }}" alt="preview" style="width:64px; height:64px; object-fit:cover; border-radius:10px;"></div>
    {% endif %}
    <div class="btn-row">
      <button class="btn green" type="submit">{{ submit_label }}</button>
      <a class="btn secondary" href="/admin/achievements">Назад</a>
    </div>
  </form>
</div>
{% endblock %}
