{% extends "base.html" %}
{% block content %}
<div class="card">
  <h1 class="section-title">{{ page_title }}</h1>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  {% if success %}<div class="success">{{ success }}</div>{% endif %}
  <form method="post" action="{{ action_url }}" class="grid">
    <div class="form-grid">
      <div>
        <label>Название</label>
        <input name="title" value="{{ values.get('title', '') }}" required>
      </div>
      <div>
        <label>Slug</label>
        <input name="slug" value="{{ values.get('slug', '') }}" placeholder="Можно оставить пустым">
      </div>
      <div>
        <label>Иконка URL</label>
        <input name="icon_url" value="{{ values.get('icon_url', '') }}" placeholder="https://...">
      </div>
      <div>
        <label style="display:flex; gap:8px; align-items:center; font-weight:600; margin-top:30px;">
          <input type="checkbox" name="is_active" {% if values.get('is_active', True) %}checked{% endif %} style="width:auto;">
          Активна
        </label>
      </div>
    </div>
    <div>
      <label>Описание</label>
      <textarea name="description">{{ values.get('description', '') }}</textarea>
    </div>
    <div class="btn-row">
      <button class="btn green" type="submit">{{ submit_label }}</button>
      <a class="btn secondary" href="/admin/achievements">Назад</a>
    </div>
  </form>
</div>
{% endblock %}
