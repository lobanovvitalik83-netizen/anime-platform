{% extends "base.html" %}
{% block content %}
<div class="page-head">
  <div>
    <h1>{{ page_title }}</h1>
    <div class="page-sub">Загрузи картинку или укажи ссылку. Она будет показываться маленьким бейджем в профилях и списках.</div>
  </div>
</div>
<div class="card">
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  {% if success %}<div class="success">{{ success }}</div>{% endif %}
  <form method="post" action="{{ action_url }}" enctype="multipart/form-data" class="grid">
    <div class="form-grid">
      <div>
        <label>Название ачивки</label>
        <input name="title" value="{{ values.get('title','') }}" required>
      </div>
      <div>
        <label>Ссылка на картинку</label>
        <input name="image_url" value="{{ values.get('image_url','') }}" placeholder="https://... или /uploads/achievements/...">
      </div>
      <div>
        <label>Или загрузить картинку</label>
        <input type="file" name="image_file" accept="image/*">
      </div>
    </div>
    <div>
      <label>Описание</label>
      <textarea name="description">{{ values.get('description','') }}</textarea>
    </div>
    <div class="btn-row">
      <button class="btn green" type="submit">{{ submit_label }}</button>
      <a class="btn ghost" href="/admin/achievements">Назад</a>
    </div>
  </form>
</div>
{% endblock %}
