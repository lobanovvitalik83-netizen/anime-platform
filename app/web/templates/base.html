<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>{{ page_title }} - Media Bridge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { color-scheme: light; }
    body { margin:0; font-family: Arial, sans-serif; background:#f5f7fb; color:#1f2937; }
    .wrap { max-width:1200px; margin:0 auto; padding:24px; }
    .topbar { background:#111827; color:#fff; }
    .topbar .wrap { display:flex; align-items:center; justify-content:space-between; gap:16px; }
    .brand { font-size:22px; font-weight:700; color:#fff; text-decoration:none; }
    .nav { display:flex; flex-wrap:wrap; gap:10px; }
    .nav a { color:#d1d5db; text-decoration:none; padding:8px 12px; border-radius:10px; background:#1f2937; }
    .nav a:hover { background:#374151; color:#fff; }
    .grid { display:grid; gap:18px; }
    .grid.cards { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .card { background:#fff; border-radius:16px; box-shadow:0 8px 28px rgba(0,0,0,.07); padding:20px; }
    h1, h2, h3 { margin-top:0; }
    .btn { display:inline-block; padding:10px 14px; border-radius:10px; text-decoration:none; border:0; background:#2563eb; color:#fff; cursor:pointer; }
    .btn.secondary { background:#374151; }
    .btn.green { background:#059669; }
    .btn-row { display:flex; gap:10px; flex-wrap:wrap; }
    table { width:100%; border-collapse:collapse; background:#fff; border-radius:14px; overflow:hidden; }
    th, td { text-align:left; padding:12px 14px; border-bottom:1px solid #e5e7eb; vertical-align:top; }
    th { background:#f9fafb; }
    form.inline { display:inline; }
    label { display:block; font-weight:600; margin-bottom:6px; }
    input, select, textarea { width:100%; box-sizing:border-box; padding:10px 12px; border:1px solid #d1d5db; border-radius:10px; background:#fff; }
    textarea { min-height:120px; resize:vertical; }
    .form-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:16px; }
    .muted { color:#6b7280; font-size:14px; }
    textarea { min-height:140px; }
    .error { background:#fef2f2; color:#991b1b; padding:12px 14px; border-radius:12px; margin-bottom:16px; }
    .success { background:#ecfdf5; color:#065f46; padding:12px 14px; border-radius:12px; margin-bottom:16px; }
    .code { font-family: monospace; background:#f3f4f6; padding:2px 6px; border-radius:6px; }
    .stat { font-size:30px; font-weight:700; margin-bottom:6px; }
    .login-box { max-width:420px; margin:80px auto; }
  </style>
</head>
<body>
  {% if current_admin %}
  <div class="topbar">
    <div class="wrap">
      <a href="/admin" class="brand">Media Bridge</a>
      <div class="nav">
        <a href="/admin">Панель</a>
        <a href="/admin/titles">Тайтлы</a>
        <a href="/admin/seasons">Сезоны</a>
        <a href="/admin/episodes">Эпизоды</a>
        <a href="/admin/assets">Ассеты</a>
        <a href="/admin/codes">Коды</a>
        <a href="/admin/codes/generate">Генерация кодов</a>
        <a href="/admin/card-builder">Создание карточки</a>
        <a href="/admin/import-export">Импорт/экспорт</a>
        <a href="/admin/import-jobs">Импорт jobs</a>
        <a href="/admin/lookup-test">Тест lookup</a>
        <a href="/docs">API docs</a>
        <a href="/admin/logout">Выход ({{ current_admin.username }})</a>
      </div>
    </div>
  </div>
  {% endif %}
  <div class="wrap">
    {% block content %}{% endblock %}
  </div>

  <script>
    function toggleGroup(source, groupName) {
      document.querySelectorAll('input[name="' + groupName + '"]').forEach(function(cb) {
        cb.checked = source.checked;
      });
    }
    function getSelectedIds(groupName) {
      return Array.from(document.querySelectorAll('input[name="' + groupName + '"]:checked')).map(function(cb) {
        return cb.value;
      });
    }
    function openSelectedEdit(basePath, groupName) {
      const ids = getSelectedIds(groupName);
      if (!ids.length) {
        alert('Сначала выбери записи.');
        return false;
      }
      ids.forEach(function(id) {
        window.open(basePath + '/' + id + '/edit', '_blank');
      });
      return false;
    }
  </script>
</body>
</html>
