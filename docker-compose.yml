version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: anime_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: anime_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build: ./apps/api
    container_name: anime_api
    restart: always
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    volumes:
      - ./apps/api:/app
    ports:
      - "8000:8000"

volumes:
  postgres_data:
